<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder — Felix Ruz</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'system-ui', 'sans-serif'],
          display: ['Space Grotesk', 'sans-serif'],
        },
        colors: {
          ink: '#14171c',
          paper: '#fbfaf7',
          line: '#e3e0d8',
          accent: '#2563eb',
          accentsoft: '#eaf0fe',
          muted: '#6b7280',
          danger: '#dc2626',
        },
      },
    },
  };
</script>

<!--
  Component classes used by elements that index.js builds dynamically
  (cards, inputs, buttons, etc.). Defined with @apply so the JS file,
  which assigns these class names directly, needs no changes.
-->
<style type="text/tailwindcss">
  @layer components {
    .icon-btn {
      @apply w-[38px] h-[38px] flex items-center justify-center border border-line bg-white rounded-[10px] cursor-pointer;
    }

    .btn {
      @apply font-sans text-[13px] font-semibold rounded-[9px] border border-line bg-white px-3 py-[9px] cursor-pointer text-ink inline-flex items-center gap-1.5 transition-colors duration-150;
    }
    .btn:hover { @apply border-accent bg-accentsoft; }
    .btn-primary { @apply bg-ink text-white border-ink; }
    .btn-primary:hover { @apply bg-black border-black; }
    .btn-ghost { @apply bg-transparent; }

    .side-section { @apply border-t border-line py-[18px]; }
    .side-section:first-child { @apply border-t-0; }

    .section-header { @apply flex items-center justify-between mb-3; }
    .section-title { @apply font-display text-[13px] font-bold uppercase tracking-wider text-ink m-0; }
    .btn-add { @apply text-xs font-semibold text-accent bg-accentsoft border-none px-[9px] py-[5px] rounded-[7px] cursor-pointer; }
    .btn-add:hover { @apply bg-[#dde7fd]; }

    .section-body { @apply flex flex-col gap-2.5; }

    .card { @apply bg-[#faf9f6] border border-line rounded-xl px-3 pt-3 pb-3.5 flex flex-col gap-2; }
    .card-head { @apply flex items-center justify-between; }
    .card-num { @apply text-[11px] font-bold text-muted tracking-wide; }
    .btn-remove { @apply w-[22px] h-[22px] border-none bg-transparent text-danger cursor-pointer text-[13px] rounded-md; }
    .btn-remove:hover { @apply bg-red-100; }

    .field { @apply flex flex-col gap-1; }
    .field-label { @apply text-[11px] font-semibold text-muted; }
    .input { @apply font-sans text-[13px] px-2.5 py-2 border border-line rounded-lg bg-white text-ink w-full; }
    .input:focus { @apply outline-none border-accent ring-4 ring-accentsoft; }
    .textarea { @apply resize-y leading-relaxed; }

    .preview-label { @apply text-xs font-semibold text-muted uppercase tracking-wider; }
  }
</style>
</head>

<body class="m-0 h-full font-sans bg-paper text-ink">

<div class="app flex h-screen overflow-hidden max-[900px]:flex-col max-[900px]:h-auto max-[900px]:min-h-screen">

  <!-- Mobile topbar -->
  <div class="topbar hidden max-[900px]:flex items-center justify-between px-4 py-3 border-b border-line bg-paper sticky top-0 z-20">
    <button class="icon-btn" id="open-drawer-btn" aria-label="Open menu">☰</button>
    <div class="font-display font-bold text-[15px] tracking-tight">Resume Builder</div>
    <button class="icon-btn" id="print-btn-mobile" aria-label="Print">🖨</button>
  </div>

  <div id="drawer-overlay" class="fixed inset-0 bg-ink/40 z-30"></div>

  <!-- Sidebar / Drawer -->
  <aside id="sidebar"
    class="w-[360px] shrink-0 border-r border-line flex flex-col bg-white
           max-[900px]:fixed max-[900px]:top-0 max-[900px]:bottom-0 max-[900px]:left-0
           max-[900px]:-translate-x-full max-[900px]:transition-transform max-[900px]:duration-250
           max-[900px]:z-40 max-[900px]:w-[min(86vw,360px)] max-[900px]:shadow-2xl">

    <div class="px-[22px] pt-[22px] pb-4 border-b border-line">
      <div class="flex items-center justify-between">
        <div class="font-display font-bold text-[19px] tracking-tight flex items-baseline gap-1.5">
          Resume<span class="text-accent">.</span>Builder
        </div>
        <button class="icon-btn hidden max-[900px]:flex" id="close-drawer-btn" aria-label="Close menu">✕</button>
      </div>
      <div class="text-muted text-xs mt-1">Edit the fields below — the preview updates live.</div>
      <div class="mt-3.5 flex items-center gap-2">
        <label class="btn btn-ghost" for="file-upload">⬆ Upload .md</label>
        <input type="file" id="file-upload" class="hidden" accept=".md,.markdown,text/markdown,text/plain" />
        <button class="btn btn-ghost" id="reset-btn">↺ Reset</button>
      </div>
      <a href="./sample/SampleUploadFile.md" download class="inline-block mt-6 text-blue-500 underline text-xs">Download Sample</a>
    </div>

    <div id="sidebar-content" class="flex-1 overflow-y-auto px-[22px] pt-1.5 pb-[90px]">
      <!-- sections injected by index.js -->
    </div>

    <div class="border-t border-line px-[22px] py-3.5 flex gap-2">
      <button class="btn btn-primary flex-1 max-[900px]:hidden" id="print-btn">🖨 Print resume</button>
    </div>
  </aside>

  <!-- Preview -->
  <main class="preview-area flex-1 overflow-y-auto bg-[#e7e4db] flex justify-center px-[18px] pt-7 pb-[60px] max-[900px]:px-2.5 max-[900px]:pt-4 max-[900px]:pb-10">
    <div class="w-full max-w-[850px]">
      <div class="flex items-center justify-between mb-3.5">
        <span class="preview-label">Live preview</span>
        <span class="preview-label">A4</span>
      </div>
      <div class="bg-white shadow-[0_10px_30px_rgba(20,23,28,0.18)] rounded-[2px] overflow-hidden">
        <iframe id="preview-frame" title="Resume preview" class="w-full h-[1130px] max-[900px]:h-[1020px] border-0 block"></iframe>
      </div>
    </div>
  </main>
</div>

<div id="toast"
  class="fixed bottom-[22px] left-1/2 -translate-x-1/2 translate-y-5 bg-ink text-white px-[18px] py-2.5 rounded-[9px] text-[13px] font-medium opacity-0 pointer-events-none transition-all duration-200 z-50">
</div>

<script src="index.js"></script>

<script>
  // .show / .open / .toast-error are toggled via classList in index.js;
  // map them to the Tailwind utility states defined above.
  const style = document.createElement('style');
  style.textContent = `
    #drawer-overlay { display: none; }
    #drawer-overlay.show { display: block; }
    #sidebar.open { transform: translateX(0) !important; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.toast-error { background-color: #dc2626; }
  `;
  document.head.appendChild(style);
</script>
</body>
</html>
